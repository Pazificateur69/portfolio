<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>DataForge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0b; color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; }
    
    #auth { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 999; }
    .auth-box { background: #111; border: 1px solid #333; border-radius: 12px; padding: 32px; width: 360px; }
    .auth-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .auth-sub { font-size: 12px; color: #888; margin-bottom: 20px; }
    input { width: 100%; padding: 10px 12px; background: #0a0a0b; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 10px; outline: none; }
    button { width: 100%; padding: 10px; background: linear-gradient(135deg, #7c3aed, #5b21b6); border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; }
    .error { color: #f87171; font-size: 11px; margin-top: 8px; display: none; text-align: center; }
    
    #dashboard { display: none; }
    .header { padding: 16px 20px; border-bottom: 1px solid #222; background: #0a0a0b; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-weight: 700; font-size: 14px; }
    .logout { background: none; border: none; color: #f87171; cursor: pointer; font-size: 12px; }
    
    .main { padding: 20px; max-width: 1200px; margin: 0 auto; }
    .section { margin-bottom: 30px; }
    .section-title { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
    .card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.2s; }
    .card:hover { border-color: #7c3aed; background: rgba(124, 58, 237, 0.05); }
    .card.active { border-color: #7c3aed; background: rgba(124, 58, 237, 0.1); }
    .card-icon { font-size: 24px; margin-bottom: 8px; }
    .card-name { font-size: 11px; font-weight: 600; }
    .card-sub { font-size: 9px; color: #666; margin-top: 4px; }
    
    .panel { background: #111; border: 1px solid #222; border-radius: 8px; display: none; margin-bottom: 20px; overflow: hidden; }
    .panel.active { display: block; }
    .panel-header { padding: 12px 16px; border-bottom: 1px solid #222; background: #0a0a0b; display: flex; justify-content: space-between; align-items: center; }
    .panel-close { background: none; border: none; color: #666; cursor: pointer; font-size: 16px; }
    .panel-content { padding: 16px; }
    .panel-content iframe { width: 100%; height: 600px; border: none; }
    
    .footer { padding: 12px 20px; border-top: 1px solid #222; font-size: 10px; color: #666; text-align: center; }
  </style>
</head>
<body>

<div id="auth">
  <div class="auth-box">
    <div style="font-size: 32px; margin-bottom: 12px;">🔐</div>
    <div class="auth-title">DataForge</div>
    <div class="auth-sub">RNCP AIS Infrastructure</div>
    <form onsubmit="auth(event)">
      <input type="password" id="pwd" placeholder="Password..." autocomplete="current-password" />
      <button type="submit">Access</button>
    </form>
    <div class="error" id="err"></div>
  </div>
</div>

<div id="dashboard">
  <div class="header">
    <div><strong style="font-size: 14px;">DataForge Infrastructure</strong></div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
  
  <div class="main">
    <div class="section">
      <div class="section-title">📊 Status</div>
      <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
        <div class="card" style="cursor: auto; border-color: #222;">
          <div style="font-size: 11px; color: #666;">VMs</div>
          <div style="font-size: 16px; font-weight: 700;">5/5</div>
        </div>
        <div class="card" style="cursor: auto; border-color: #222;">
          <div style="font-size: 11px; color: #666;">Services</div>
          <div style="font-size: 16px; font-weight: 700;">23/24</div>
        </div>
        <div class="card" style="cursor: auto; border-color: #222;">
          <div style="font-size: 11px; color: #666;">Wazuh</div>
          <div style="font-size: 16px; font-weight: 700;">4 agents</div>
        </div>
        <div class="card" style="cursor: auto; border-color: #222;">
          <div style="font-size: 11px; color: #666;">Lynis</div>
          <div style="font-size: 16px; font-weight: 700;">74%</div>
        </div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">🔗 Services</div>
      <div class="grid">
        <div class="card" onclick="openService('wazuh')"><div class="card-icon">🔴</div><div class="card-name">Wazuh</div><div class="card-sub">8444</div></div>
        <div class="card" onclick="openService('grafana')"><div class="card-icon">🔵</div><div class="card-name">Grafana</div><div class="card-sub">3000</div></div>
        <div class="card" onclick="openService('adminer')"><div class="card-icon">🟢</div><div class="card-name">Adminer</div><div class="card-sub">8081</div></div>
        <div class="card" onclick="openService('ldap')"><div class="card-icon">🟡</div><div class="card-name">LDAP</div><div class="card-sub">8085</div></div>
        <div class="card" onclick="openService('prometheus')"><div class="card-icon">📊</div><div class="card-name">Prometheus</div><div class="card-sub">9090</div></div>
        <div class="card" onclick="openService('alertmanager')"><div class="card-icon">⚡</div><div class="card-name">Alertmanager</div><div class="card-sub">9093</div></div>
      </div>
    </div>
    
    <div class="panel" id="panel">
      <div class="panel-header">
        <div id="panel-title" style="font-weight: 600; font-size: 12px;"></div>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
      <div class="panel-content">
        <iframe id="frame"></iframe>
      </div>
    </div>
  </div>
  
  <div class="footer">DataForge • RNCP AIS • Commit: 54815df</div>
</div>

<script>
const PASS = 'DataForge@Infra2025';

async function auth(e) {
  e.preventDefault();
  const hash = await sha256(document.getElementById('pwd').value);
  const correctHash = await sha256(PASS);
  if (hash === correctHash) {
    sessionStorage.setItem('auth', '1');
    document.getElementById('auth').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  } else {
    const err = document.getElementById('err');
    err.textContent = 'Incorrect';
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 2000);
  }
}

function logout() {
  sessionStorage.removeItem('auth');
  location.reload();
}

function openService(name) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  event.target.closest('.card').classList.add('active');
  document.getElementById('panel-title').textContent = ['wazuh', 'grafana', 'adminer', 'ldap', 'prometheus', 'alertmanager'].includes(name) ? name.toUpperCase() : name;
  // Use Cloudflare Worker as proxy gateway
  document.getElementById('frame').src = `https://dataforge-proxy.workers.dev/?s=${name}`;
  document.getElementById('panel').classList.add('active');
}

function closePanel() {
  document.getElementById('panel').classList.remove('active');
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

window.addEventListener('load', () => {
  if (sessionStorage.getItem('auth') === '1') {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  }
});
</script>

</body>
</html>
